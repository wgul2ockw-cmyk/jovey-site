<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Attention Switch</title>
  <meta name="description" content="Track where your attention goes — time per project and the number of switches between them." />
  <meta name="theme-color" content="#F8F9FA" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Attention" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prata&family=Anuphan:wght@400;500;600&family=Quicksand:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="wash" aria-hidden="true"></div>

  <div class="shell">
    <header class="topbar">
      <a class="brand" href="#" data-action="goHome" aria-label="Attention Switch — home">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <rect width="32" height="32" rx="9" fill="#121317" />
          <path d="M9 12h10.5M16.5 8.5 20 12l-3.5 3.5M23 20H12.5M15.5 16.5 12 20l3.5 3.5"
                stroke="#F8F9FA" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </svg>
        <span class="brand-name">Attention&nbsp;Switch</span>
      </a>
      <span class="brand-tag">every session's companion</span>
    </header>

    <main id="app" aria-live="off"></main>

    <footer class="footer">
      <p>Every tap is an attention switch — the number is the point.</p>
      <p class="foot-home"><a href="https://jovey.co/">a jovey.co companion</a></p>
    </footer>
  </div>

  <div id="announcer" class="visually-hidden" role="status" aria-live="polite"></div>
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
